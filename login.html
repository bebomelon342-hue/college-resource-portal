<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-center bg-gradient-to-br from-slate-950 to-blue-900">
<div class="glass-card form-box text-white">
  <h2 class="title">Student Login</h2>
  <form id="loginForm">
    <input type="email" id="email" placeholder="College Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit" class="btn-primary w-full">Login</button>
  </form>
  <p class="mt-4 text-center">New user? <a href="register.html">Register</a></p>
</div>
<script type="module" src="js/auth.js"></script>
</body>
</html>
